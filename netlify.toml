[build]
  command = "npm install -g pnpm && pnpm install && NODE_ENV=production BASE_PATH=/ PORT=3000 pnpm --filter @workspace/diet-tracker run build"
  publish = "artifacts/diet-tracker/dist/public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pg-native"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
