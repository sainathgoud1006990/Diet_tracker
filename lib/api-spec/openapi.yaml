openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Diet tracking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: diet-logs
    description: Daily diet log operations
  - name: profile
    description: User profile operations
  - name: calories
    description: Calorie estimation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: No profile yet
    post:
      operationId: upsertProfile
      tags: [profile]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /calories/estimate:
    post:
      operationId: estimateCalories
      tags: [calories]
      summary: Estimate calories from a food description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalorieEstimateInput"
      responses:
        "200":
          description: Estimated calories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalorieEstimateResult"

  /diet-logs:
    get:
      operationId: listDietLogs
      tags: [diet-logs]
      summary: List all diet logs for a month
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of diet logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DietLog"
    post:
      operationId: upsertDietLog
      tags: [diet-logs]
      summary: Create or update a diet log for a day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietLogInput"
      responses:
        "200":
          description: Diet log saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietLog"

  /diet-logs/summary:
    get:
      operationId: getMonthSummary
      tags: [diet-logs]
      summary: Get monthly summary stats
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthSummary"

  /diet-logs/{date}:
    get:
      operationId: getDietLog
      tags: [diet-logs]
      summary: Get diet log for a specific date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diet log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietLog"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MealType:
      type: ["string", "null"]
      enum: [healthy, moderate, junk, null]

    UserProfile:
      type: object
      required: [id, weightKg, heightCm, age, gender, activityLevel, dailyCalorieGoal, createdAt, updatedAt]
      properties:
        id:
          type: integer
        weightKg:
          type: number
        heightCm:
          type: number
        age:
          type: integer
        gender:
          type: string
          enum: [male, female]
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active]
        dailyCalorieGoal:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    UserProfileInput:
      type: object
      required: [weightKg, heightCm, age, gender, activityLevel]
      properties:
        weightKg:
          type: number
        heightCm:
          type: number
        age:
          type: integer
        gender:
          type: string
          enum: [male, female]
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active]

    CalorieEstimateInput:
      type: object
      required: [foodDescription]
      properties:
        foodDescription:
          type: string

    CalorieEstimateResult:
      type: object
      required: [estimatedCalories, items]
      properties:
        estimatedCalories:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [food, calories]
            properties:
              food:
                type: string
              calories:
                type: integer

    DietLog:
      type: object
      required: [id, date, breakfastType, lunchType, dinnerType, snacksType, breakfastFood, lunchFood, dinnerFood, snacksFood, waterCups, calories, note, dayStatus, createdAt, updatedAt]
      properties:
        id:
          type: integer
        date:
          type: string
        breakfastType:
          $ref: "#/components/schemas/MealType"
        lunchType:
          $ref: "#/components/schemas/MealType"
        dinnerType:
          $ref: "#/components/schemas/MealType"
        snacksType:
          $ref: "#/components/schemas/MealType"
        breakfastFood:
          type: ["string", "null"]
        lunchFood:
          type: ["string", "null"]
        dinnerFood:
          type: ["string", "null"]
        snacksFood:
          type: ["string", "null"]
        waterCups:
          type: integer
        calories:
          type: ["integer", "null"]
        note:
          type: ["string", "null"]
        dayStatus:
          type: string
          enum: [clean, cheat, moderate, empty]
        createdAt:
          type: string
        updatedAt:
          type: string

    DietLogInput:
      type: object
      required: [date]
      properties:
        date:
          type: string
        breakfastType:
          $ref: "#/components/schemas/MealType"
        lunchType:
          $ref: "#/components/schemas/MealType"
        dinnerType:
          $ref: "#/components/schemas/MealType"
        snacksType:
          $ref: "#/components/schemas/MealType"
        breakfastFood:
          type: ["string", "null"]
        lunchFood:
          type: ["string", "null"]
        dinnerFood:
          type: ["string", "null"]
        snacksFood:
          type: ["string", "null"]
        waterCups:
          type: integer
        calories:
          type: ["integer", "null"]
        note:
          type: ["string", "null"]

    MonthSummary:
      type: object
      required: [year, month, totalLogged, cleanDays, cheatDays, moderateDays, currentStreak, avgWaterCups, avgCalories]
      properties:
        year:
          type: integer
        month:
          type: integer
        totalLogged:
          type: integer
        cleanDays:
          type: integer
        cheatDays:
          type: integer
        moderateDays:
          type: integer
        currentStreak:
          type: integer
        avgWaterCups:
          type: number
        avgCalories:
          type: ["number", "null"]
