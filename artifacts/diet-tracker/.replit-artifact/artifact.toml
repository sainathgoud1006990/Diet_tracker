kind = "web"
previewPath = "/"
title = "Diet Tracker"
version = "1.0.0"
id = "artifacts/diet-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22318

[services.development]
run = "pnpm --filter @workspace/diet-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diet-tracker", "run", "build" ]
publicDir = "artifacts/diet-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22318"
BASE_PATH = "/"
